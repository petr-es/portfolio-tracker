<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Portfolio<span class="slash">/</span><span class="date" id="header-date">–</span></h1>
  <span class="total">– tis. Kč</span>
  <div class="meta" id="header-meta"></div>
</header>

<div class="grid">

  <div class="card">
    <div class="card-title">Složení dle aktiva</div>
    <div class="chart-wrap">
      <svg class="donut" viewBox="0 0 160 160">
        <g id="donut-assets"></g>
        <text class="donut-center" x="80" y="77" id="center-assets">–</text>
        <text class="donut-label"  x="80" y="91">Kč</text>
      </svg>
      <div style="flex:1; min-width:0;">
        <table class="legend">
          <thead>
            <tr>
              <th>Aktívum</th>
              <th>Podíl</th>
              <th>tis. Kč</th>
              <th>Ks</th>
            </tr>
          </thead>
          <tbody id="tbl-assets"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Složení dle brokera</div>
    <div class="chart-wrap">
      <svg class="donut" viewBox="0 0 160 160">
        <g id="donut-brokers"></g>
        <text class="donut-center" x="80" y="77" id="center-brokers">–</text>
        <text class="donut-label"  x="80" y="91">Kč</text>
      </svg>
      <div style="flex:1; min-width:0;">
        <table class="legend">
          <thead>
            <tr>
              <th>Broker</th>
              <th>Podíl</th>
              <th>tis. Kč</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbl-brokers"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="card card-full">
    <div class="card-title">Assety</div>
    <div class="table-scroll">
      <table class="legend legend--fixed">
        <colgroup>
          <col><col><col><col><col><col>
        </colgroup>
        <thead>
          <tr>
            <th>Aktívum</th>
            <th>Cena</th>
            <th>Kurz</th>
            <th>Kč / ks</th>
            <th>Ks celkem</th>
            <th>Hodnota</th>
          </tr>
        </thead>
        <tbody id="tbl-prices"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="footnote-row">
  <div class="footnote" id="footnote"></div>
  <div class="theme-toggle">
    <select id="theme-select" onchange="setTheme(this.value)">
      <option value="blue">Blue</option>
      <option value="grey">Grey</option>
    </select>
  </div>
</div>

<script src="data.js"></script>
<script src="portfolio.js"></script>
<script>
  const THEMES = { blue: 'style.css', grey: 'style-grey.css' };
  const sheet = document.querySelector('link[rel="stylesheet"]');
  const sel = document.getElementById('theme-select');

  function setTheme(val) {
    sheet.setAttribute('href', THEMES[val]);
    localStorage.setItem('theme', val);
  }

  // restore last used theme
  const saved = localStorage.getItem('theme') || 'blue';
  sel.value = saved;
  if (saved !== 'blue') sheet.setAttribute('href', THEMES[saved]);
</script>

</body>
</html>
